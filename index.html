<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My8OSS</title>
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body>

  <div id="global-header"></div>

  <main>
    <section class="hero">
      <h1>Once a Myth, Now My8OSS</h1>
    </section>

    <section class="vision">
      <h2>We turn ideas into apps</h2>
      <div class="journey">
        <div class="node" data-label="Idea">
          <span class="dot"></span>
        </div>
        <div class="node" data-label="Build">
          <span class="dot"></span>
        </div>
        <div class="node" data-label="Apps">
          <span class="dot"></span>
        </div>
        <div class="journey-line">
          <div class="moving-dot"></div>
        </div>
      </div>
    </section>

    <section class="apps">
      <h2>All Apps</h2>
      <div id="apps-grid"></div>
    </section>
  </main>


  <div id="global-footer"></div>

  <script type="module">
    import { fetchApps } from './assets/js/renderApps.js';
    import { initGlobalLayout } from './assets/js/global-layout.js';


    initGlobalLayout();

    const apps = await fetchApps();
    const grid = document.getElementById('apps-grid');

    apps.forEach(app => {
      const card = document.createElement('div');
      card.className = 'card';

      card.innerHTML = `
        <img
          src="assets/images/${app.slug}/image1.webp"
          alt="${app.name}"
        />
        <h3>${app.name}</h3>
        <p>${app.description || ''}</p>
        <a href="apps/${app.slug}.html" class="open-btn">Open App →</a>
      `;

      grid.appendChild(card);
    });
  </script>
</body>
</html>
