<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Scriptable Questionnaire Engine</title>

  <link rel="stylesheet" href="../assets/css/styles.css" />
  <link rel="stylesheet" href="../assets/sidePanel/style.css" />

  <style>
    .comparison-slider {
      position: relative;
      width: 100%;
      max-width: 800px;
      margin: 2rem auto;
      overflow: hidden;
      cursor: ns-resize;
      user-select: none;
      border-radius: 12px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.5);
      background: #1a1a1a;
    }

    .comparison-slider img {
      display: block;
      width: 100%;
      height: auto;
      pointer-events: none;
    }

    .img-before {
      position: relative;
      z-index: 1;
    }

    .img-after-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 50%;
      overflow: hidden;
      z-index: 2;
      border-bottom: 3px solid #4da3ff;
    }

    .img-after-overlay .img-after {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: auto;
    }

    .drag-handle {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 40px;
      height: 40px;
      background: #4da3ff;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      z-index: 3;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 12px rgba(77,163,255,0.8);
      pointer-events: auto;
    }

    .drag-handle::before {
      content: "⇕";
      color: #fff;
      font-size: 20px;
      line-height: 1;
    }

    .labels {
      display: flex;
      justify-content: space-between;
      margin-top: 8px;
      font-size: 0.85rem;
      color: #aaa;
    }
    .docs-btn {
      background: #4da3ff;
      color: #0d0d0d;
      border: none;
      padding: 4px 14px;
      border-radius: 50px;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      vertical-align: middle;
      transition: background 0.2s;
    }
    .docs-btn:hover {
      background: #3b8fd9;
    }
  </style>
</head>

<body>
  <main class="layout">
    <section class="content">
      <div id="global-header"></div>
      <h1>Survey-making becomes easier</h1>
      <p>SQE (which stands for Scriptable Questionnaire Ecosystem) is an ecosystem that allows users to create and customize their own questionnaires using a simple and intuitive syntax.</p>

      <h2>Before &amp; After</h2>
      <div class="comparison-slider" id="comparisonSlider">
        <img class="img-before" src="../assets/images/sqe/exampleoutput.webp" alt="Before" />
        <div class="img-after-overlay" id="overlay">
          <img class="img-after" src="../assets/images/sqe/exampleinput.webp" alt="After" />
        </div>
        <div class="drag-handle" id="handle"></div>
      </div>
      <div class="labels">
        <span>▲ After (top)</span>
        <span>▼ Before (bottom)</span>
      </div>

      <h2>Use <button class="docs-btn" onclick="location.href='https://my8oss.github.io/docs/pypippark'">docs</button> to learn more!</h2>

    </section>
  </main>
  <div id="global-footer"></div>

  <aside id="side-panel"></aside>

  <script>
    window.APP_NAME = window.location.pathname.split('/').pop().replace(/\.html$/, '');
  </script>
  <script type="module" src="../assets/js/addition.js"></script>

  <script>
    (function() {
      const slider = document.getElementById('comparisonSlider');
      const overlay = document.getElementById('overlay');
      const handle = document.getElementById('handle');
      if (!slider || !overlay || !handle) return;

      let dragging = false;

      function updatePosition(clientY) {
        const rect = slider.getBoundingClientRect();
        let y = clientY - rect.top;
        y = Math.max(0, Math.min(y, rect.height));
        const percent = (y / rect.height) * 100;

        overlay.style.height = percent + '%';
        handle.style.top = percent + '%';
      }

      slider.addEventListener('mousedown', (e) => {
        dragging = true;
        updatePosition(e.clientY);
        e.preventDefault();
      });

      window.addEventListener('mousemove', (e) => {
        if (!dragging) return;
        updatePosition(e.clientY);
      });

      window.addEventListener('mouseup', () => {
        dragging = false;
      });

      slider.addEventListener('touchstart', (e) => {
        dragging = true;
        updatePosition(e.touches[0].clientY);
        e.preventDefault();
      });

      window.addEventListener('touchmove', (e) => {
        if (!dragging) return;
        updatePosition(e.touches[0].clientY);
      });

      window.addEventListener('touchend', () => {
        dragging = false;
      });
    })();
  </script>
  <script type="module">
    import { initGlobalLayout } from '../assets/js/global-layout.js';
    import { fetchJSON } from '../assets/js/renderApps.js';
    import { renderSidePanel } from '../assets/sidePanel/script.js';

    initGlobalLayout();

    const appData = await fetchJSON(`../data/apps/${window.APP_NAME}.json`);
    document.title = `${appData.name} - My8OSS`;
    const panelContainer = document.getElementById('side-panel');
    await renderSidePanel(appData, panelContainer);
  </script>
</body>
</html>
